<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Create Hotel Profile - MartBridge</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI',system-ui,sans-serif;
}

body{
  min-height:100vh;
  background:linear-gradient(135deg,#eafff3,#f4fffb);
  display:flex;
  justify-content:center;
  align-items:center;
}

.card{
  width:100%;
  max-width:440px;
  background:white;
  border-radius:24px;
  padding:34px 30px;
  box-shadow:0 20px 60px rgba(0,0,0,.08);
  text-align:center;
}

.brand{
  font-size:26px;
  font-weight:800;
  color:#0bb15d;
}

.subtitle{
  color:#4a7c63;
  font-size:14px;
  margin:8px 0 24px;
}

/* IMAGE */
.profile-upload{
  width:120px;
  height:120px;
  margin:0 auto 22px;
  position:relative;
}

.profile-upload img{
  width:100%;
  height:100%;
  border-radius:50%;
  border:4px solid #0bb15d;
  object-fit:cover;
  background:#f0fff7;
}

.profile-upload input{display:none;}

.upload-btn{
  position:absolute;
  right:0;
  bottom:0;
  width:34px;
  height:34px;
  border-radius:50%;
  background:#0bb15d;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:18px;
  cursor:pointer;
  border:3px solid white;
}

/* INPUTS */
.group{
  text-align:left;
  margin-bottom:14px;
}

.group label{
  font-size:12px;
  color:#4a7c63;
}

.group input{
  width:100%;
  margin-top:6px;
  padding:13px 14px;
  border-radius:12px;
  border:1px solid #d9f3e6;
  font-size:14px;
  outline:none;
}

.group input:focus{
  border-color:#0bb15d;
  box-shadow:0 0 0 2px rgba(11,177,93,.12);
}

/* BUTTON */
button{
  width:100%;
  margin-top:18px;
  padding:14px;
  border:none;
  border-radius:30px;
  background:linear-gradient(135deg,#0bb15d,#14d87a);
  color:white;
  font-size:16px;
  font-weight:700;
  cursor:pointer;
}

button:hover{opacity:.9}

.footer-text{
  margin-top:14px;
  font-size:12px;
  color:#6fa58a;
}
</style>
</head>

<body>

<div class="card">

  <div class="brand">MartBridge</div>
  <div class="subtitle">Create your Hotel profile</div>

  <!-- IMAGE -->
  <div class="profile-upload">
    <img id="preview" src="https://cdn-icons-png.flaticon.com/512/3075/3075977.png">
    <label for="file" class="upload-btn">+</label>
    <input type="file" id="file" accept="image/*">
  </div>

  <form id="hotelForm">

    <div class="group">
      <label>Hotel Name</label>
      <input type="text" id="hotelName" required>
    </div>

    <div class="group">
      <label>Owner Name</label>
      <input type="text" id="ownerName" required>
    </div>

    <div class="group">
      <label>Email ID</label>
      <input type="email" id="email" required>
    </div>

    <div class="group">
      <label>UPI ID</label>
      <input type="text" id="upi" required>
    </div>

    <div class="group">
      <label>Location</label>
      <input type="text" id="location" required>
    </div>

    <div class="group">
      <label>Password</label>
      <input type="password" id="password" required>
    </div>

    <button type="submit">Create Hotel Profile</button>
  </form>

  <div class="footer-text">
    Connected to MartBridge Department Store
  </div>

</div>

<script>
let imageData = "";

/* IMAGE LOAD */
document.getElementById("file").addEventListener("change", function(e){
  const file = e.target.files[0];
  if(file){
    const reader = new FileReader();
    reader.onload = () => {
      imageData = reader.result;
      document.getElementById("preview").src = imageData;
    }
    reader.readAsDataURL(file);
  }
});

/* SUBMIT */
document.getElementById("hotelForm").addEventListener("submit", function(e){
  e.preventDefault();

  let hotels = JSON.parse(localStorage.getItem("hotels")) || [];

  const hotelData = {
    name: hotelName.value,
    owner: ownerName.value,
    email: email.value,
    upi: upi.value,
    location: location.value,
    password: password.value,
    image: imageData
  };

  hotels.push(hotelData);
  localStorage.setItem("hotels", JSON.stringify(hotels));

  alert("Hotel added successfully!");
  window.location.href = "department-dashboard.html";
});
</script>

</body>
</html>
