<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Create Profile – MartBridge</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: 'Segoe UI', system-ui, sans-serif;
}

body{
  min-height:100vh;
  background:linear-gradient(135deg,#eafff3,#f4fffb);
  display:flex;
  justify-content:center;
  align-items:center;
}

.card{
  width:100%;
  max-width:430px;
  background:white;
  border-radius:22px;
  padding:35px 30px;
  box-shadow:0 20px 60px rgba(0,0,0,0.08);
  text-align:center;
}

/* LOGO / TITLE */
.brand{
  font-size:26px;
  font-weight:800;
  color:#0bb15d;
  margin-bottom:6px;
}

.subtitle{
  color:#4a7c63;
  font-size:14px;
  margin-bottom:25px;
}

/* PROFILE UPLOAD */
.profile-upload{
  position:relative;
  width:110px;
  height:110px;
  margin:0 auto 25px;
}

.profile-upload img{
  width:100%;
  height:100%;
  border-radius:50%;
  object-fit:cover;
  border:4px solid #0bb15d;
  background:#f0fff7;
}

.profile-upload input{
  display:none;
}

.upload-btn{
  position:absolute;
  bottom:0;
  right:0;
  background:#0bb15d;
  width:34px;
  height:34px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  font-size:18px;
  cursor:pointer;
  border:3px solid white;
}

/* INPUTS */
.group{
  text-align:left;
  margin-bottom:14px;
}

.group label{
  font-size:12px;
  color:#4a7c63;
}

.group input{
  width:100%;
  margin-top:6px;
  padding:13px 14px;
  border-radius:12px;
  border:1px solid #d9f3e6;
  outline:none;
  font-size:14px;
}

.group input:focus{
  border-color:#0bb15d;
  box-shadow:0 0 0 2px rgba(11,177,93,0.1);
}

/* BUTTON */
button{
  width:100%;
  margin-top:16px;
  padding:14px;
  border:none;
  border-radius:30px;
  background:linear-gradient(135deg,#0bb15d,#14d87a);
  color:white;
  font-size:16px;
  font-weight:700;
  cursor:pointer;
}

.alt-btn{
  background:#0a7c45;
}

.hide{
  display:none;
}

.footer-text{
  margin-top:16px;
  font-size:12px;
  color:#6fa58a;
}
.or-box{
  display:flex;
  align-items:center;
  margin:18px 0 10px;
}

.or-box span{
  font-size:12px;
  color:#7fb99a;
  padding:0 10px;
  white-space:nowrap;
}

.or-box::before,
.or-box::after{
  content:"";
  flex:1;
  height:1px;
  background:#d9f3e6;
}
#map{
  width:100%;
  height:220px;
  border-radius:14px;
  margin-top:8px;
  border:1px solid #d9f3e6;
}

#address{
  margin-top:10px;
  background:#f4fffb;
}

</style>
<script src="https://fonts.googleapis.com/css2?family=Andika:ital,wght@0,400;0,700;1,400;1,700&family=Exo:ital,wght@0,100..900;1,100..900&display=swap"></script>
</head>

<body>

<div class="card">

  <div class="brand">MartBridge</div>
  <div class="subtitle" id="subtitle">Create your Meat Store profile</div>

  <!-- PROFILE IMAGE -->
  <div class="profile-upload" id="imgBox">
    <img id="preview" src="https://cdn-icons-png.flaticon.com/512/869/869636.png">
    <label for="file" class="upload-btn">+</label>
    <input type="file" id="file" accept="image/*">
  </div>

  <form id="storeForm">

    <div class="group" id="storeGroup">
      <label>Store Name</label>
      <input type="text" id="storeName" placeholder="Eg: MartBridge Mart">
    </div>

    <div class="group" id="locationGroup">
      <label>Location</label>
      <input type="text" id="location" placeholder="City, Area">
    </div>

    <div class="group" id="upiGroup">
      <label>UPI ID</label>
      <input type="text" id="upi" placeholder="example@upi">
    </div>
    <div class="group">
      <label>Select Store Location (Map)</label>
      <div id="map"></div>
      <input type="text" id="address" placeholder="Selected address" readonly>
    </div>
    

    <div class="group" id="phoneGroup">
      <label>Phone Number</label>
      <input type="tel" id="phone" placeholder="Enter phone number">
    </div>

    <div class="group">
      <label>Email ID</label>
      <input type="email" id="email" placeholder="Enter mail id" required>
    </div>

    <div class="group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Create password" required>
    </div>

    <button type="submit" id="mainBtn">Create Profile</button>

<div class="or-box">
  <span>OR</span>
</div>

<button type="button" class="alt-btn" id="loginBtn">Login / Sign In</button>

  </form>

  <div class="footer-text">
    Your profile will be visible to connected hotels & agents
  </div>

</div>

<script>
    let imageData = "";
    let loginMode = false;
    let selectedLat = "";
    let selectedLng = "";
    
    /* IMAGE UPLOAD */
    document.getElementById("file").addEventListener("change", function(e){
      const file = e.target.files[0];
      if(file){
        const reader = new FileReader();
        reader.onload = () => {
          imageData = reader.result;
          document.getElementById("preview").src = imageData;
        };
        reader.readAsDataURL(file);
      }
    });
    
    /* LOGIN MODE UI */
    document.getElementById("loginBtn").addEventListener("click", () => {
      loginMode = true;
      document.getElementById("subtitle").innerText = "Login to your Meat Store";
    
      document.getElementById("imgBox").classList.add("hide");
      document.getElementById("storeGroup").classList.add("hide");
      document.getElementById("locationGroup").classList.add("hide");
      document.getElementById("upiGroup").classList.add("hide");
      document.getElementById("phoneGroup").classList.add("hide");
    
      document.getElementById("map").style.display = "none";
      document.getElementById("address").style.display = "none";
    
      document.getElementById("mainBtn").innerText = "Login";
      document.getElementById("loginBtn").style.display = "none";
    });
    
    /* SUBMIT */
    document.getElementById("storeForm").addEventListener("submit", async function(e){
      e.preventDefault();
    
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
    
      if(loginMode){
        // ✅ LOGIN
        try {
          const res = await fetch("http://localhost:5000/api/meat/login", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ email, password })
          });
    
          const data = await res.json();
    
          if(res.ok){
            alert("✅ Login successful");
            localStorage.setItem("meatId", data.meat._id); // ✅ correct key
            window.location.href = "meat-dashboard.html";
          } else {
            alert("❌ " + data.message);
          }
    
        } catch(err){
          console.error(err);
          alert("Server error");
        }
    
      } else {
        // ✅ REGISTER
        try {
          const res = await fetch("http://localhost:5000/api/meat/register", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
              storeName: document.getElementById("storeName").value,
              ownerName: "Meat Owner",
              email,
              password,
              location: document.getElementById("address").value,
              phone: document.getElementById("phone").value,
              upi: document.getElementById("upi").value,
              profileImage: imageData,
              lat: selectedLat,
              lng: selectedLng
            })
          });
    
          const data = await res.json();
    
          if(res.ok){
            alert("✅ Profile created successfully");
            localStorage.setItem("meatId", data.meat._id); // ✅ correct key
            window.location.href = "meat-dashboard.html";
          } else {
            alert("❌ " + data.error);
          }
    
        } catch(err){
          console.error(err);
          alert("Server not responding. Check console.");
        }
      }
    });
    </script>
    
  
  



</body>
</html>
