<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Meat Store Dashboard - MartBridge</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif;}

body{ 
  min-height:100vh;
  background:url('https://akm-img-a-in.tosshub.com/indiatoday/images/story/202203/Grocery_store.jpg?size=690:388') no-repeat center/cover;
  position:relative;
  color:white;
}

.overlay{position:absolute;inset:0;background:rgba(0,0,0,0.6);}

/* TOP BAR */
.topbar{position:fixed;top:15px;right:20px;z-index:10;}
.profile-icon{
  width:45px;height:45px;border-radius:50%;
  object-fit:cover;cursor:pointer;border:2px solid #00b050;
}

/* PROFILE POPUP */
.overlay-blur{
  position:fixed;inset:0;
  backdrop-filter:blur(10px);
  background:rgba(0,0,0,0.4);
  display:none;justify-content:center;align-items:center;
  z-index:999;
}

.profile-popup{
  background:white;width:320px;border-radius:20px;
  padding:30px 20px;text-align:center;
  position:relative;color:#222;animation:zoom .3s ease;
}

@keyframes zoom{from{transform:scale(.6);opacity:0}to{transform:scale(1);opacity:1}}

.popup-img{
  width:140px;height:140px;border-radius:50%;
  object-fit:cover;border:4px solid #00b050;
  margin-top:-90px;background:white;
}

.edit-btn{
  margin-top:20px;width:100%;padding:12px;
  background:#00b050;color:white;border:none;
  border-radius:12px;font-size:16px;cursor:pointer;
}

.close-btn{position:absolute;top:15px;right:18px;font-size:20px;cursor:pointer;}

/* HERO */
.center-content{
  position:relative;z-index:1;min-height:70vh;
  display:flex;flex-direction:column;
  justify-content:center;align-items:center;
  text-align:center;padding:20px;
}

.center-content h1{font-size:48px;}
.center-content h2{font-size:24px;color:#c8ffe4;margin:10px 0 30px;}

.add-hotel{
  padding:18px 50px;font-size:20px;font-weight:700;
  border:none;border-radius:50px;
  background:#0bb15d;color:white;cursor:pointer;
  box-shadow:0 8px 25px rgba(0,0,0,0.4);
}

/* DASH */
.dash-sections{
  position:relative;z-index:2;max-width:1100px;
  margin:-40px auto 80px;
  display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:24px;padding:0 20px;
}

.dash-card{
  background:rgba(255,255,255,0.12);
  backdrop-filter:blur(14px);
  border-radius:22px;padding:28px;min-height:170px;
  display:flex;flex-direction:column;justify-content:center;
  align-items:center;text-align:center;cursor:pointer;
  transition:.3s;box-shadow:0 8px 25px rgba(0,0,0,.3);
}

.dash-card:hover{transform:translateY(-6px) scale(1.02);background:rgba(11,177,93,0.25);}

.logout-btn{
  position:fixed;top:20px;left:20px;
  padding:10px 18px;border:none;border-radius:20px;
  background:linear-gradient(135deg,#ff4d4d,#ff0000);
  color:white;font-weight:600;cursor:pointer;
  box-shadow:0 8px 20px rgba(255,0,0,0.3);
  z-index:999;
}
</style>
</head>

<body>

<button id="logoutBtn" class="logout-btn">Logout</button>

<div class="topbar">
  <img src="profile.jpg" class="profile-icon" id="openProfile">
</div>

<div class="overlay-blur" id="profileOverlay">
  <div class="profile-popup">
    <img src="profile.jpg" class="popup-img" id="popupImg">
    <h2 id="popupName">Meat Store</h2>
    <button class="edit-btn" onclick="window.location.href='Meat-profile-update.html'">Edit Profile</button>
    <span class="close-btn" id="closeProfile">✕</span>
  </div>
</div>

<div class="overlay"></div>

<div class="center-content">
  <h1>MEAT STORE</h1>
  <h2 id="storeTitle">Welcome to your store</h2>
  <button class="add-hotel">+ ADD HOTEL</button>
</div>

<div class="dash-sections">
  <div class="dash-card" onclick="window.location.href='Meat-set-prices.html'">
    <h3>📊 Set Today’s Prices</h3>
    <p>Update daily meat prices</p>
  </div>

  <div class="dash-card">
    <h3>🏨 Manage Hotels</h3>
    <p>Send requests and manage hotels</p>
  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

  const meatId = localStorage.getItem("meatId");
  if(!meatId){
    alert("Please login again");
    window.location.href = "Meat-register.html";
    return;
  }

  fetch(`http://localhost:5000/api/meat/${meatId}`)
    .then(async res => {
      const text = await res.text();
      try { return JSON.parse(text); }
      catch { throw new Error("Server not returning JSON"); }
    })
    .then(data => {
      storeTitle.innerText = data.storeName || "My Meat Store";
      popupName.innerText = data.storeName || "Meat Store";

      if(data.profileImage){
        openProfile.src = data.profileImage;
        popupImg.src = data.profileImage;
      }
    })
    .catch(err => {
      console.error(err);
      storeTitle.innerText = "Unable to load store";
      alert("Server error while loading dashboard");
    });

  openProfile.onclick = ()=> profileOverlay.style.display="flex";
  closeProfile.onclick = ()=> profileOverlay.style.display="none";

  profileOverlay.onclick = e => {
    if(e.target === profileOverlay){
      profileOverlay.style.display="none";
    }
  };
});

// LOGOUT
logoutBtn.addEventListener("click", () => {
  localStorage.removeItem("meatId");
  alert("Logged out successfully");
  window.location.href = "main-dashboard.html";
});
</script>

</body>
</html>
