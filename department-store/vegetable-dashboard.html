<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Vegetable Store Dashboard - MartBridge</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif;}

body{ 
  min-height:100vh;
  background:url('https://images.unsplash.com/photo-1542838132-92c53300491e') no-repeat center/cover;
  position:relative;
  color:white;
}

.overlay{position:absolute;inset:0;background:rgba(0,0,0,0.6);}

/* TOP PROFILE */
.topbar { position: fixed; top: 15px; right: 20px; z-index: 10; }

.profile-icon {
  width: 45px; height: 45px; border-radius: 50%;
  object-fit: cover; cursor: pointer;
  border: 2px solid #00b050;
}

/* LOGOUT */
.logout-btn {
  position: fixed;
  top: 20px;
  left: 20px;
  padding: 10px 18px;
  border: none;
  border-radius: 20px;
  background: linear-gradient(135deg, #ff4d4d, #ff0000);
  color: white;
  font-weight: 600;
  cursor: pointer;
  box-shadow: 0 8px 20px rgba(255,0,0,0.3);
  z-index: 999;
}

/* PROFILE POPUP */
.overlay-blur {
  position: fixed; inset: 0;
  backdrop-filter: blur(10px);
  background: rgba(0,0,0,0.4);
  display: none; justify-content: center; align-items: center;
  z-index: 999;
}

.profile-popup {
  background: white; width: 320px; border-radius: 20px;
  padding: 30px 20px; text-align: center;
  position: relative; color:#222;
}

.popup-img {
  width: 140px; height: 140px; border-radius: 50%;
  object-fit: cover; border: 4px solid #00b050;
  margin-top: -90px; background: white;
}

.edit-btn {
  margin-top: 20px; width: 100%; padding: 12px;
  background: #00b050; color: white;
  border: none; border-radius: 12px;
  font-size: 16px; cursor: pointer;
}

.close-btn { position:absolute; top:15px; right:18px; font-size:20px; cursor:pointer; }

/* HERO */
.center-content{
  position:relative; z-index:1; min-height:70vh;
  display:flex; flex-direction:column;
  justify-content:center; align-items:center;
  text-align:center; padding:20px;
}

.center-content h1{font-size:48px;}
.center-content h2{color:#c8ffe4;margin:10px 0 30px;}

/* DASH SECTIONS */
.dash-sections{
  position:relative; z-index:2; max-width:1000px;
  margin:-40px auto 80px;
  display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:24px; padding:0 20px;
}

.dash-card{
  background:rgba(255,255,255,0.12);
  backdrop-filter:blur(14px);
  border-radius:22px; padding:28px; min-height:160px;
  display:flex; flex-direction:column;
  justify-content:center; align-items:center;
  text-align:center; cursor:pointer; transition:.3s;
}

.dash-card:hover{transform:translateY(-6px) scale(1.02);background:rgba(11,177,93,0.25);}
</style>
</head>

<body>

<button id="logoutBtn" class="logout-btn">Logout</button>

<!-- Top Profile -->
<div class="topbar">
  <img src="profile.jpg" class="profile-icon" id="openProfile">
</div>

<!-- Profile Popup -->
<div class="overlay-blur" id="profileOverlay">
  <div class="profile-popup">
    <img src="profile.jpg" class="popup-img">
    <h2 id="popupName">Vegetable Store</h2>
    <button class="edit-btn" onclick="window.location.href='vegetable-profile-update.html'">Edit Profile</button>
    <span class="close-btn" id="closeProfile">✕</span>
  </div>
</div>

<div class="overlay"></div>

<div class="center-content">
  <h1>VEGETABLE STORE</h1>
  <h2 id="storeTitle">Loading...</h2>
</div>

<div class="dash-sections">
  <div class="dash-card" onclick="window.location.href='vegetable-set-prices.html'">
    <h3>🥦 Set Today’s Prices</h3>
    <p>Update daily vegetable rates</p>
  </div>

  <div class="dash-card">
    <h3>🏨 Connected Hotels</h3>
    <p>Manage hotel connections</p>
  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

  const vegId = localStorage.getItem("vegId");

  if (!vegId) {
    alert("Please login again");
    window.location.href = "vegetable-register.html";
    return;
  }

  // ✅ Load vegetable data
  fetch(`http://localhost:5000/api/vegetable/${vegId}`)
    .then(res => res.json())
    .then(data => {

      document.getElementById("storeTitle").innerText = data.storeName;
      document.getElementById("popupName").innerText = data.storeName;

      document.querySelector(".profile-icon").src = data.profileImage;
      document.querySelector(".popup-img").src = data.profileImage;

    })
    .catch(err => {
      console.error(err);
      alert("Server error while loading dashboard");
    });

  // popup
  const openProfile = document.getElementById("openProfile");
  const closeProfile = document.getElementById("closeProfile");
  const overlay = document.getElementById("profileOverlay");

  openProfile.onclick = () => overlay.style.display = "flex";
  closeProfile.onclick = () => overlay.style.display = "none";
  overlay.onclick = e => { if(e.target === overlay) overlay.style.display = "none"; }
});

// logout
document.getElementById("logoutBtn").addEventListener("click", () => {
  localStorage.removeItem("vegId");
  alert("Logged out successfully");
  window.location.href = "main-dashboard.html";
});
</script>

</body>
</html>
