<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MartBridge App</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  min-height:100vh;
  background:
    radial-gradient(circle at top left,#c9ffe5,transparent 40%),
    radial-gradient(circle at bottom right,#b6ffdd,transparent 40%),
    linear-gradient(135deg,#eafff3,#f4fffb);
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:24px 16px;
  color:#083b1f;
}

/* HEADER */
.header{
  width:100%;
  max-width:1100px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:26px;
}

.logo{
  font-size:26px;
  font-weight:800;
  color:#0bb15d;
}

.tag{
  font-size:13px;
  color:#3a7f5b;
}

/* TITLE */
.title{
  text-align:center;
  margin-bottom:28px;
}

.title h1{
  font-size:26px;
  font-weight:800;
}

.title span{color:#0bb15d;}

.title p{
  font-size:14px;
  color:#3a7f5b;
  margin-top:6px;
}

/* GRID */
.grid{
  width:100%;
  max-width:1100px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:18px;
}

/* CARD */
.card{
  height:240px;
  border-radius:24px;
  background-size:cover;
  background-position:center;
  position:relative;
  overflow:hidden;
  cursor:pointer;
  box-shadow:0 14px 40px rgba(0,0,0,.12);
  transition:.3s;
}

.card:hover{
  transform:translateY(-6px) scale(1.02);
}

/* OVERLAY */
.overlay{
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
  padding:20px;
  background:linear-gradient(transparent,rgba(0,0,0,.75));
  color:white;
}

.overlay h2{
  font-size:20px;
  margin-bottom:4px;
}

.overlay p{
  font-size:13px;
  opacity:.9;
}

/* FOOTER */
.footer{
  margin-top:auto;
  padding-top:26px;
  font-size:12px;
  color:#4f8f6e;
}
</style>
</head>

<body>

<div class="header">
  <div class="logo">MartBridge</div>
  <div class="tag">Smart Supply App</div>
</div>

<div class="title">
  <h1>SELECT YOUR <span>ROLE</span></h1>
  <p>Continue to register or login</p>
</div>

<div class="grid">

  <div class="card" onclick="location.href='department-register.html'"
  style="background-image:url('https://akm-img-a-in.tosshub.com/indiatoday/images/story/202203/Grocery_store.jpg?size=690:388');">
    <div class="overlay">
      <h2>Department Store</h2>
      <p>Manage items, prices & hotel tie-ups</p>
    </div>
  </div>

  <div class="card" onclick="location.href='vegetable-register.html'"
  style="background-image:url('https://images.unsplash.com/photo-1542838132-92c53300491e');">
    <div class="overlay">
      <h2>Vegetable Shop</h2>
      <p>Supply fresh vegetables to hotels</p>
    </div>
  </div>

  <div class="card" onclick="location.href='meat-register.html'"
  style="background-image:url('https://images.unsplash.com/photo-1607623814075-e51df1bdc82f');">
    <div class="overlay">
      <h2>Meat Shop</h2>
      <p>Manage meat supply & daily rates</p>
    </div>
  </div>

  <div class="card" onclick="alert('Agent module coming soon')"
  style="background-image:url('https://images.unsplash.com/photo-1555244162-803834f70033');">
    <div class="overlay">
      <h2>Catering Agent</h2>
      <p>Find nearby stores & prices</p>
    </div>
  </div>

</div>

<div class="footer">
  © 2026 MartBridge
</div>

</body>
</html>
