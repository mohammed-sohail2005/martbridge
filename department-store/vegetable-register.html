<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Create Profile – MartBridge</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
/* (STYLE SAME AS YOUR DEPARTMENT PAGE – NOT CHANGED) */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: 'Segoe UI', system-ui, sans-serif;
}
body{
  min-height:100vh;
  background:linear-gradient(135deg,#eafff3,#f4fffb);
  display:flex;
  justify-content:center;
  align-items:center;
}
.card{
  width:100%;
  max-width:430px;
  background:white;
  border-radius:22px;
  padding:35px 30px;
  box-shadow:0 20px 60px rgba(0,0,0,0.08);
  text-align:center;
}
.brand{
  font-size:26px;
  font-weight:800;
  color:#0bb15d;
  margin-bottom:6px;
}
.subtitle{
  color:#4a7c63;
  font-size:14px;
  margin-bottom:25px;
}
.profile-upload{
  position:relative;
  width:110px;
  height:110px;
  margin:0 auto 25px;
}
.profile-upload img{
  width:100%;
  height:100%;
  border-radius:50%;
  object-fit:cover;
  border:4px solid #0bb15d;
  background:#f0fff7;
}
.profile-upload input{ display:none; }
.upload-btn{
  position:absolute;
  bottom:0;
  right:0;
  background:#0bb15d;
  width:34px;
  height:34px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  font-size:18px;
  cursor:pointer;
  border:3px solid white;
}
.group{ text-align:left; margin-bottom:14px; }
.group label{ font-size:12px; color:#4a7c63; }
.group input{
  width:100%;
  margin-top:6px;
  padding:13px 14px;
  border-radius:12px;
  border:1px solid #d9f3e6;
  outline:none;
  font-size:14px;
}
.group input:focus{
  border-color:#0bb15d;
  box-shadow:0 0 0 2px rgba(11,177,93,0.1);
}
button{
  width:100%;
  margin-top:16px;
  padding:14px;
  border:none;
  border-radius:30px;
  background:linear-gradient(135deg,#0bb15d,#14d87a);
  color:white;
  font-size:16px;
  font-weight:700;
  cursor:pointer;
}
.alt-btn{ background:#0a7c45; }
.hide{ display:none; }
.footer-text{
  margin-top:16px;
  font-size:12px;
  color:#6fa58a;
}
.or-box{
  display:flex;
  align-items:center;
  margin:18px 0 10px;
}
.or-box span{
  font-size:12px;
  color:#7fb99a;
  padding:0 10px;
  white-space:nowrap;
}
.or-box::before,.or-box::after{
  content:"";
  flex:1;
  height:1px;
  background:#d9f3e6;
}
</style>
</head>

<body>

<div class="card">

  <div class="brand">MartBridge</div>
  <div class="subtitle" id="subtitle">Create your Vegetable Store profile</div>

  <div class="profile-upload" id="imgBox">
    <img id="preview" src="https://cdn-icons-png.flaticon.com/512/869/869636.png">
    <label for="file" class="upload-btn">+</label>
    <input type="file" id="file" accept="image/*">
  </div>

  <form id="storeForm">

    <div class="group" id="storeGroup">
      <label>Store Name</label>
      <input type="text" id="storeName">
    </div>

    <div class="group" id="locationGroup">
      <label>Location</label>
      <input type="text" id="location">
    </div>

    <div class="group" id="upiGroup">
      <label>UPI ID</label>
      <input type="text" id="upi">
    </div>

    <div class="group" id="phoneGroup">
      <label>Phone Number</label>
      <input type="tel" id="phone">
    </div>

    <div class="group">
      <label>Email ID</label>
      <input type="email" id="email" required>
    </div>

    <div class="group">
      <label>Password</label>
      <input type="password" id="password" required>
    </div>

    <button type="submit" id="mainBtn">Create Profile</button>

    <div class="or-box"><span>OR</span></div>

    <button type="button" class="alt-btn" id="loginBtn">Login / Sign In</button>

  </form>

  <div class="footer-text">
    Your profile will be visible to connected hotels & agents
  </div>

</div>

<script>
let imageData = "";
let loginMode = false;

/* IMAGE */
file.addEventListener("change", e=>{
  const reader = new FileReader();
  reader.onload = ()=> {
    imageData = reader.result;
    preview.src = imageData;
  }
  reader.readAsDataURL(e.target.files[0]);
});

/* LOGIN MODE */
loginBtn.addEventListener("click", ()=>{
  loginMode = true;
  subtitle.innerText = "Login to your Vegetable Store";
  imgBox.classList.add("hide");
  storeGroup.classList.add("hide");
  locationGroup.classList.add("hide");
  upiGroup.classList.add("hide");
  phoneGroup.classList.add("hide");
  mainBtn.innerText = "Login";
  loginBtn.style.display = "none";
});

/* SUBMIT */
storeForm.addEventListener("submit", async e=>{
  e.preventDefault();

  if(loginMode){
    const res = await fetch("http://localhost:5000/api/vegetable/login",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        email: email.value,
        password: password.value
      })
    });

    const data = await res.json();

    if(res.ok){
      localStorage.setItem("vegId", data._id);
      window.location.href = "vegetable-dashboard.html";
    } else {
      alert(data.error);
    }

  } else {

    const res = await fetch("http://localhost:5000/api/vegetable/register",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        storeName: storeName.value,
        location: location.value,
        upi: upi.value,
        phone: phone.value,
        email: email.value,
        password: password.value,
        profileImage: imageData
      })
    });

    const data = await res.json();

    if(res.ok){
      localStorage.setItem("vegId", data._id);
      window.location.href = "vegetable-dashboard.html";
    } else {
      alert(data.error);
    }
  }
});
</script>

</body>
</html>
