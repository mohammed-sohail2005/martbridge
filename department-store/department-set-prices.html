<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Set Today’s Prices - MartBridge</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',system-ui}

body{
  min-height:100vh;
  background:
    radial-gradient(circle at top left, #c9ffe5, transparent 40%),
    radial-gradient(circle at bottom right, #b6ffdd, transparent 40%),
    linear-gradient(135deg,#eafff3,#f4fffb);
  padding:30px 16px;
}

/* HEADER */
.header{
  max-width:1100px;
  margin:auto;
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:25px;
  background:rgba(255,255,255,0.7);
  backdrop-filter:blur(12px);
  border-radius:22px;
  padding:18px 22px;
  box-shadow:0 12px 35px rgba(0,0,0,.08);
}

.header h1{
  color:#0bb15d;
  font-size:22px;
  font-weight:800;
}

.back-btn{
  background:linear-gradient(135deg,#0bb15d,#18e187);
  color:white;
  border:none;
  border-radius:30px;
  padding:10px 18px;
  cursor:pointer;
  font-weight:700;
  box-shadow:0 6px 18px rgba(11,177,93,.35);
}

/* MAIN CARD */
.card{
  max-width:1100px;
  margin:auto;
  background:rgba(255,255,255,0.85);
  backdrop-filter:blur(14px);
  border-radius:28px;
  padding:26px;
  box-shadow:0 25px 70px rgba(0,0,0,.08);
}

/* FORM */
.form{
  display:flex;
  gap:14px;
  flex-wrap:wrap;
  margin-bottom:28px;
}

.form input{
  flex:1;
  min-width:200px;
  padding:14px 16px;
  border-radius:16px;
  border:1px solid #d9f3e6;
  outline:none;
  font-size:15px;
  background:#f7fffb;
}

.form input:focus{
  border-color:#0bb15d;
  box-shadow:0 0 0 3px rgba(11,177,93,.12);
}

.form button{
  padding:14px 26px;
  border:none;
  border-radius:30px;
  background:linear-gradient(135deg,#0bb15d,#18e187);
  color:white;
  font-weight:800;
  cursor:pointer;
  box-shadow:0 8px 22px rgba(11,177,93,.35);
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
  gap:18px;
}

/* ITEM CARD */
.item{
  background:white;
  border-radius:20px;
  padding:18px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  box-shadow:0 10px 28px rgba(0,0,0,.06);
  transition:.25s ease;
}

.item:hover{
  transform:translateY(-3px);
  box-shadow:0 18px 40px rgba(0,0,0,.1);
}

.item b{
  color:#134d35;
  font-size:16px;
}

.price{
  color:#0bb15d;
  font-weight:800;
  font-size:18px;
}

.del{
  background:linear-gradient(135deg,#0bb15d,#18e187);
  color:white;
  border:none;
  border-radius:14px;
  padding:8px 12px;
  cursor:pointer;
  font-size:12px;
  box-shadow:0 5px 14px rgba(11,177,93,.35);
}

</style>
</head>

<body>

<div class="header">
  <h1>Today’s Item Prices</h1>
  <button class="back-btn" onclick="window.location.href='department-dashboard.html'">← Back</button>
</div>

<div class="card">

  <div class="form">
    <input type="text" id="itemName" placeholder="Item name (Tomato, Onion...)">
    <input type="number" id="itemPrice" placeholder="Price (₹)">
    <button onclick="addItem()">Add Item</button>
  </div>

  <div class="grid" id="itemsGrid"></div>

</div>

<script>
  let items = JSON.parse(localStorage.getItem("todayItems")) || [];
  const grid = document.getElementById("itemsGrid");
  
  let editIndex = -1;
  
  function render(){
    grid.innerHTML="";
    items.forEach((i,index)=>{
      grid.innerHTML+=`
        <div class="item">
          <div>
            <b>${i.name}</b><br>
            <span class="price">₹ ${i.price}</span>
          </div>
          <button class="del" onclick="editItem(${index})">Edit</button>
        </div>`;
    });
  }
  
  function addItem(){
    if(itemName.value==="" || itemPrice.value===""){
      alert("Enter all fields"); 
      return;
    }
  
    if(editIndex === -1){
      // ADD MODE
      items.push({name:itemName.value, price:itemPrice.value});
    } else {
      // UPDATE MODE
      items[editIndex].name = itemName.value;
      items[editIndex].price = itemPrice.value;
      editIndex = -1;
      document.querySelector(".form button").innerText = "Add Item";
    }
  
    localStorage.setItem("todayItems", JSON.stringify(items));
    itemName.value="";
    itemPrice.value="";
    render();
  }
  
  function editItem(i){
    itemName.value = items[i].name;
    itemPrice.value = items[i].price;
    editIndex = i;
    document.querySelector(".form button").innerText = "Update Item";
  }
  
  render();
  </script>
  

</body>
</html>
